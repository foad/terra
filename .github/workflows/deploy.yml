name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-2

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check for changes
        id: changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^frontend/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v6
        if: steps.changes.outputs.changed == 'true'
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: steps.changes.outputs.changed == 'true'
        working-directory: frontend
        run: npm ci

      - name: Build
        if: steps.changes.outputs.changed == 'true'
        working-directory: frontend
        run: npm run build

      - name: Configure AWS credentials
        if: steps.changes.outputs.changed == 'true'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        if: steps.changes.outputs.changed == 'true'
        working-directory: frontend
        run: aws s3 sync dist/ s3://${{ vars.FRONTEND_BUCKET }} --delete

      - name: Invalidate CloudFront
        if: steps.changes.outputs.changed == 'true'
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*" --query 'Invalidation.Id' --output text)
          aws cloudfront wait invalidation-completed --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} --id "$INVALIDATION_ID"

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check for changes
        id: changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^backend/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: astral-sh/setup-uv@v7
        if: steps.changes.outputs.changed == 'true'

      - name: Install dependencies
        if: steps.changes.outputs.changed == 'true'
        working-directory: backend
        run: uv sync --extra dev

      - name: Lint
        if: steps.changes.outputs.changed == 'true'
        working-directory: backend
        run: uv run ruff check src/

      - name: Test
        if: steps.changes.outputs.changed == 'true'
        working-directory: backend
        run: uv run pytest

      - name: Package Lambda
        if: steps.changes.outputs.changed == 'true'
        working-directory: backend
        run: |
          mkdir -p .build/package
          uv pip install --target .build/package --python-platform x86_64-unknown-linux-gnu --python-version 3.13 --only-binary :all: -r <(uv pip compile pyproject.toml --quiet)
          cp -r src/ .build/package/
          cd .build/package && zip -rq ../lambda.zip . -x "*.pyc" "__pycache__/*"

      - name: Configure AWS credentials
        if: steps.changes.outputs.changed == 'true'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy terra-api
        if: steps.changes.outputs.changed == 'true'
        working-directory: backend
        run: |
          aws lambda update-function-code \
            --function-name terra-api \
            --zip-file fileb://.build/lambda.zip \
            --query 'FunctionName' --output text

      - name: Deploy terra-photo-processor
        if: steps.changes.outputs.changed == 'true'
        working-directory: backend
        run: |
          aws lambda update-function-code \
            --function-name terra-photo-processor \
            --zip-file fileb://.build/lambda.zip \
            --query 'FunctionName' --output text

  e2e:
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install chromium

      - name: Run E2E tests
        working-directory: frontend
        run: npx playwright test
        env:
          E2E_BASE_URL: https://terra.foad.dev

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
